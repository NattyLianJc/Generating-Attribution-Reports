model:
  arch: blip2_t5_instruct
  # model_type: caption_coco_opt2.7b
  model_type: flant5xl
  # caption_coco_opt2.7b
  load_finetuned: False
  load_pretrained: True
  pretrained: "/home/lmj/lly/workspace/LAVIS-main/lavis/output/ib+mlm0.3/20240120135/checkpoint_20.pth"
  use_grad_checkpoint: False

datasets:
  coco_caption: # name of the dataset builder
    vis_processor:
        eval:
          name: "blip_image_eval"
          image_size: 224
    text_processor:
        eval:
          name: "blip_caption"
#     build_info:
#         images:
#             storage: '/export/share/datasets/vision/coco/images/'

run:
  task: captioning
  # optimizer
  batch_size_train: 32 #32
  batch_size_eval: 32 #16
  num_workers: 4

  max_len: 60 # 30
  min_len: 8
  num_beams: 5

  seed: 42
  output_dir: "output/ib+test+mlm0.3"

  evaluate: True
  test_splits: ["val"]
  # valid_splits: [ "test" ]

  device: "cuda:1"
  world_size: 1
  dist_url: "env://"
  distributed: False
