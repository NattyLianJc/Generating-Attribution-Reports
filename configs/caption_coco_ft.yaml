# ==============================================================================
# 1. Model Configuration
# ==============================================================================
model:
  arch: blip2_t5_instruct
  model_type: flant5xl
  
  # Checkpoint loading
  load_pretrained: True
  load_finetuned: False
  # pretrained: "path/to/your/pretrained/checkpoint.pth" # 取消注释并修改为相对路径以加载预训练权重
  
  # Architecture specific settings
  use_grad_checkpoint: True
  freeze_vit: True
  qformer_text_input: True
  
  # Custom modules (Manipulation Detection)
  num_classes: 21
  # 建议：开源时应确保这些路径在 README 中有明确的下载指导，并放置在统一的 weights 文件夹下
  multi_label_classifier_path: "model_parameter/ViT-H_14-add_cnn_branch_3_5-add_max_pool-21_class-weight_1_02-bce_focal_dice_jaccard_loss/Fakeface-ViT-H_14-add_cnn_branch_3_5-add_max_pool-21_class-weight_1_02-bce_focal_dice_jaccard_loss_checkpoint.bin"
  bert_folder: "model_parameter/bert-base-uncased"

# ==============================================================================
# 2. Datasets Configuration
# ==============================================================================
datasets:
  coco_caption: # Dataset builder name
    vis_processor:
        train:
          name: "blip2_image_train"
          image_size: 224
        eval:
          name: "blip_image_eval"
          image_size: 224
    text_processor:
        train:
          name: "blip_caption"
          prompt: "" 
        eval:
          name: "blip_caption"

# ==============================================================================
# 3. Training & Evaluation Configuration (Runner)
# ==============================================================================
run:
  task: captioning
  
  # ✨ [新增] 对接重构后的 mytrain.py，控制参数冻结策略
  # 可选值: "pretrain" (仅训 Q-former 等), "finetune" (全参或解冻多模态部分)
  training_stage: "pretrain" 

  # --- Optimizer & Scheduler ---
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 9e-6
  min_lr: 9e-7
  warmup_lr: 11.25e-9
  warmup_steps: 1000
  weight_decay: 0.05
  max_epoch: 1000
  accum_grad_iters: 1

  # --- Dataloader ---
  batch_size_train: 24
  batch_size_eval: 16
  num_workers: 4

  # --- Generation Settings ---
  max_len: 100
  min_len: 5
  num_beams: 5

  # --- I/O & Logging ---
  seed: 42
  # 💡 强烈建议：不要用超长字符串做实验记录。
  # 框架会自动在 output_dir 下按日期生成子文件夹。
  output_dir: "output/instructBlip_t5/stage2_finetune_lora" 
  resume_ckpt_path: null
  evaluate: False

  # --- Data Splits ---
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  # --- Environment & Distributed ---
  amp: True
  device: "cuda:0" # 建议：如果使用 torchrun/slurm，LAVIS 会自动覆盖这个值
  world_size: 1
  dist_url: "env://"
  distributed: False